spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/agentum
    username: agentum
    password: agentum_dev_password
  # 运行态异步执行强依赖本地中间件，请先执行 make dev-infra 启动 Redis 与 RabbitMQ。
  data:
    redis:
      host: localhost
      port: 6379
  rabbitmq:
    host: localhost
    port: 5672
    username: agentum
    password: agentum_dev_password
  flyway:
    locations:
      - classpath:db/migration/schema
      - classpath:db/migration/devdata
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

logging:
  level:
    root: INFO
    # 本地排查模型连通性、流式调用和运行态 SSE 时打开 DEBUG；生产 profile 勿沿用
    com.agentum.agent.infrastructure: DEBUG
    com.agentum.agent.application.AgentRuntimeService: DEBUG
    com.agentum.system.infrastructure.HttpModelProviderConnectionTester: DEBUG
    com.agentum.workbench.application.WorkbenchRuntimeService: DEBUG

agentum:
  auth:
    token-secret: agentum-local-development-secret-change-before-production
    token-ttl-minutes: 480
  security:
    field-encryption:
      master-key: agentum-local-field-encryption-secret-change-before-production
