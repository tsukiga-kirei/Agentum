spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/agentum
    username: agentum
    password: agentum_dev_password
  flyway:
    locations:
      - classpath:db/migration/schema
      - classpath:db/migration/devdata
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

agentum:
  auth:
    token-secret: agentum-local-development-secret-change-before-production
    token-ttl-minutes: 480
  security:
    field-encryption:
      master-key: agentum-local-field-encryption-secret-change-before-production
