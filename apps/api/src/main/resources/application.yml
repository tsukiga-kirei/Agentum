spring:
  servlet:
    multipart:
      # 业务层仍会按系统配置和字段配置取更小值校验；此处只提供平台级硬上限。
      max-file-size: 200MB
      max-request-size: 220MB
  application:
    name: agentum-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  flyway:
    locations:
      - classpath:db/migration/schema

server:
  port: 8080

# 运行态异步执行（RabbitMQ 执行 + Redis Stream 进度回放）配置。
# 节点执行超时通过环境变量 AGENTUM_RUNTIME_NODE_TIMEOUT_SECONDS 控制，防止单节点无限占用 Worker。
agentum:
  platform:
    # 平台业务时区；Docker / 本地统一通过 AGENTUM_TIMEZONE 覆盖，影响定时任务、运行变量和日志行前缀时间。
    timezone: ${AGENTUM_TIMEZONE:Asia/Shanghai}
  storage:
    minio:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY:agentum}
      secret-key: ${MINIO_SECRET_KEY:agentum_dev_password}
      bucket: ${MINIO_BUCKET:agentum}
      object-prefix: ${MINIO_OBJECT_PREFIX:deliveries/documents}
      auto-create-bucket: ${MINIO_AUTO_CREATE_BUCKET:true}
  runtime:
    agent:
      # 每个流程节点必须保存业务值；建议值用于设计态初始化，最大值用于平台安全约束，运行时不做隐式兜底。
      suggested-iterations-per-turn: ${AGENTUM_AGENT_SUGGESTED_ITERATIONS_PER_TURN:4}
      max-iterations-per-turn: ${AGENTUM_AGENT_MAX_ITERATIONS_PER_TURN:20}
    execution:
      node-timeout-seconds: ${AGENTUM_RUNTIME_NODE_TIMEOUT_SECONDS:1800}
      worker-concurrency: ${AGENTUM_RUNTIME_WORKER_CONCURRENCY:4}
      max-attempts: 3
      cluster-parallelism: ${AGENTUM_RUNTIME_CLUSTER_PARALLELISM:4}
    redis:
      stream-max-len: 5000
      lease-ttl-seconds: 300
      stale-node-threshold-seconds: ${AGENTUM_RUNTIME_STALE_THRESHOLD_SECONDS:120}
    rabbitmq:
      exchange: agentum.runtime
      queue-node-execute: runtime.node.execute
      queue-node-execute-dlq: runtime.node.execute.dlq
      queue-attachment-parse: runtime.attachment.parse
      queue-attachment-parse-dlq: runtime.attachment.parse.dlq

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  pattern:
    level: "%5p [scope:%X{logScope:-SYSTEM}] [requestId:%X{requestId:-none}] [tenantId:%X{tenantId:-none}] [userId:%X{userId:-none}] [role:%X{role:-none}]"
