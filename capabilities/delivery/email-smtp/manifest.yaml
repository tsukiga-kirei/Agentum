key: email-smtp
name: SMTP 邮箱交付
version: v1
riskLevel: high
deliveryChannel: email
configSchema:
  type: object
  required:
    - smtpHost
    - smtpPort
    - fromAddress
  properties:
    smtpHost:
      type: string
      description: SMTP 主机，例如 localhost
    smtpPort:
      type: integer
      description: SMTP 端口，例如 Mailpit 的 1025
    smtpUsername:
      type: string
      description: SMTP 账号，可为空
    smtpPassword:
      type: string
      description: SMTP 密码，由后端加密保存
    fromAddress:
      type: string
      description: 发件邮箱
    useTls:
      type: boolean
      description: 是否启用 STARTTLS
tools:
  - name: email_smtp.send_email
    description: 发送邮件正文和附件
    inputSchema:
      type: object
      required:
        - to
        - subject
        - body
      properties:
        to:
          type: array
          items:
            type: string
        subject:
          type: string
        body:
          type: string
        attachmentPaths:
          type: array
          items:
            type: string
