services:
  web:
    build:
      context: .
      dockerfile: deploy/docker/web.Dockerfile
    environment:
      API_BASE_URL: http://api:8080
    ports:
      - "5173:80"
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: deploy/docker/api.Dockerfile
    env_file:
      - .env
    environment:
      MINIO_ENDPOINT: http://minio:9000
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
      - rabbitmq
      - minio

  document-worker:
    build:
      context: .
      dockerfile: deploy/docker/document-worker.Dockerfile
    env_file:
      - .env
    environment:
      MINIO_ENDPOINT: http://minio:9000
    depends_on:
      - rabbitmq
      - minio

  ai-worker:
    build:
      context: .
      dockerfile: deploy/docker/ai-worker.Dockerfile
    env_file:
      - .env
    depends_on:
      - rabbitmq

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agentum
      POSTGRES_USER: agentum
      POSTGRES_PASSWORD: agentum_dev_password
    volumes:
      - agentum_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    volumes:
      - agentum_redis_data:/data

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: agentum
      RABBITMQ_DEFAULT_PASS: agentum_dev_password
    volumes:
      - agentum_rabbitmq_data:/var/lib/rabbitmq

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: agentum
      MINIO_ROOT_PASSWORD: agentum_dev_password
    volumes:
      - agentum_minio_data:/data

volumes:
  agentum_postgres_data:
  agentum_redis_data:
  agentum_rabbitmq_data:
  agentum_minio_data:
