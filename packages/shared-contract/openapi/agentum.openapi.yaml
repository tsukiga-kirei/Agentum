        id:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [draft, review, published]
        version:
          type: string
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowNode"
        variables:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowVariable"
      required:
        - id
        - name
        - status
        - nodes
        - variables
    WorkflowNode:
      type: object
      properties:
        nodeId:
          type: string
        nodeType:
          type: string
          enum: [trigger, user_input, agent, parallel_group, merge, condition, human_review, delivery]
        name:
          type: string
        inputVariables:
          type: array
          items:
            type: string
        outputVariables:
          type: array
          items:
            type: string
        config:
          type: object
        timeoutSeconds:
          type: integer
      required:
        - nodeId
        - nodeType
        - name
        - inputVariables
        - outputVariables
    WorkflowVariable:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: [string, number, boolean, object, array, file, decision]
        sourceNode:
          type: string
        description:
          type: string
        jsonSchema:
          type: object
        sensitive:
          type: boolean
        deliverable:
          type: boolean
      required:
        - name
        - type
        - sourceNode
        - sensitive
        - deliverable
