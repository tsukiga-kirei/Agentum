openapi: 3.1.0
info:
  title: Agentum API
  version: 0.1.0
  description: Agentum 平台 API 契约占位文件。
servers:
  - url: http://localhost:8080
    description: 本地开发环境
paths:
  /api/public/tenants:
    get:
      summary: 获取公开租户列表
      description: 登录页使用的活跃租户轻量列表。公网 SaaS 场景后续应替换为租户编码或域名识别。
      tags:
        - Auth
      responses:
        "200":
          description: 活跃租户列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/TenantOption"
  /api/public/tenants/{tenantId}/sso-providers:
    get:
      summary: 获取租户已启用企业认证入口
      description: 登录页按当前租户发现企业认证方式。OAuth2/OIDC 可由前端发起授权跳转；Basic 只提示从可信业务系统进入。
      tags:
        - Auth
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 当前租户启用的企业认证入口
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/SsoProviderOption"
  /api/auth/bootstrap-status:
    get:
      summary: 获取首次部署初始化状态
      description: 当 users 表没有任何账号时返回 needsSetup=true，前端应跳转到初始化页创建首个系统管理员。
      tags:
        - Auth
      responses:
        "200":
          description: 初始化状态
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/BootstrapStatusResponse"
  /api/auth/bootstrap:
    post:
      summary: 创建首个系统管理员
      description: 仅在系统无任何用户时允许调用，创建 system_admin 角色且 tenantId 为空的首个管理员账号。
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BootstrapAdminRequest"
      responses:
        "200":
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "400":
          description: 参数不合法
        "409":
          description: 系统已初始化，不能重复创建管理员
  /api/auth/login:
    post:
      summary: 登录并建立活跃入口上下文
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: 登录成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/LoginResponse"
        "400":
          description: 请求参数不完整或租户不可用
        "401":
          description: 用户名、密码或登录状态不正确
        "403":
          description: 用户没有所选入口权限
  /api/auth/me:
    get:
      summary: 获取当前登录用户
      tags:
        - Auth
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 当前用户上下文
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/LoginResponse"
        "401":
          description: 未登录或令牌无效
  /api/auth/refresh:
    post:
      summary: 轮换 Refresh Token 并签发新的 Access Token
      description: Refresh Token 通过 HttpOnly Cookie 传递；成功后旧令牌立即失效并通过 Set-Cookie 返回新令牌。
      tags:
        - Auth
      responses:
        "200":
          description: 刷新成功
          headers:
            Set-Cookie:
              description: 轮换后的 HttpOnly Refresh Token Cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Refresh Token 缺失、过期、已吊销或已使用
  /api/auth/switch-role:
    put:
      summary: 切换当前活跃角色
      tags:
        - Auth
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SwitchRoleRequest"
      responses:
        "200":
          description: 切换成功，返回新 token、用户上下文、活跃角色和菜单
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/SwitchRoleResponse"
        "401":
          description: 未登录或令牌无效
        "403":
          description: 目标角色不属于当前用户
  /api/auth/logout:
    post:
      summary: 退出登录
      tags:
        - Auth
      description: 吊销当前 Refresh Token 并清理 HttpOnly Cookie；Access Token 最多在其短有效期内自然失效。
      responses:
        "200":
          description: 已退出
  /api/notifications:
    get:
      summary: 查询当前用户消息
      description: 返回系统公告、租户公告和定时任务结果消息，支持按未读/已读筛选。
      tags:
        - Notification
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [all, unread, read]
            default: all
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: size
          in: query
          schema: { type: integer, default: 10 }
      responses:
        "200":
          description: 当前用户消息分页
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/NotificationPageResponse"
  /api/notifications/unread-count:
    get:
      summary: 获取当前用户未读消息数
      tags: [Notification]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 未读消息数
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/NotificationUnreadCount"
  /api/notifications/read-all:
    patch:
      summary: 将当前用户消息全部标记为已读
      tags: [Notification]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 更新后的未读消息数
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/NotificationUnreadCount"
  /api/notifications/{messageId}/read:
    patch:
      summary: 将单条消息标记为已读
      tags: [Notification]
      security:
        - bearerAuth: []
      parameters:
        - name: messageId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: 已标记为已读
  /api/notifications/announcements:
    post:
      summary: 发布公告类消息
      description: 系统管理员发布全局公告；租户管理员仅能在当前租户上下文发布租户公告。内容为 Markdown。
      tags: [Notification]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublishAnnouncementRequest"
      responses:
        "200":
          description: 已发布的公告消息
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/NotificationRow"
  /api/auth/sso/basic-entry:
    get:
      summary: Basic 共享密钥单点入口
      description: 可信业务系统使用 Basic username `tenantCode/username` 和租户共享密码访问；成功后返回登录桥接 HTML 并设置 Refresh Cookie。
      tags:
        - Auth
      parameters:
        - name: portal
          in: query
          schema:
            type: string
            enum: [business, tenant_admin]
            default: business
      security:
        - basicAuth: []
      responses:
        "200":
          description: 登录桥接 HTML
          content:
            text/html:
              schema:
                type: string
        "401":
          description: Basic 凭据缺失或共享密码错误
        "403":
          description: 来源 IP / 域名不在白名单或用户无入口权限
  /api/auth/sso/basic-redirection:
    get:
      summary: Basic 服务端换取浏览器登录地址
      description: 可信业务系统服务端使用 Basic username `tenantCode/username` 和租户共享密码调用。成功返回仅可使用一次的 Agentum 登录地址；调用方应将 Location 原样重定向给浏览器。
      tags:
        - Auth
      parameters:
        - name: portal
          in: query
          schema:
            type: string
            enum: [business, tenant_admin]
            default: business
      security:
        - basicAuth: []
      responses:
        "302":
          description: Location 为一次性 Agentum 登录地址
        "401":
          description: Basic 凭据缺失或共享密码错误
        "403":
          description: 来源 IP / 域名不在白名单或用户无入口权限
  /api/auth/sso/basic-consume:
    get:
      summary: 消费 Basic 单点登录地址
      description: 浏览器访问一次性地址后由 Agentum 建立 Refresh Cookie 会话并返回登录桥接 HTML。该接口不接受共享密码。
      tags:
        - Auth
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 登录桥接 HTML
          content:
            text/html:
              schema:
                type: string
        "401":
          description: 登录地址已过期或已被消费
  /api/tenants/{tenantId}/assets/summary:
    get:
      summary: 获取能力资产总览
      description: 业务侧能力资产页使用，聚合系统管理开放给租户的能力、租户管理已分配给当前主体的能力和当前用户自建能力数量。
      tags:
        - Asset
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 能力资产总览
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AssetSummary"
  /api/tenants/{tenantId}/assets/system-capabilities:
    get:
      summary: 查询对当前主体开放的系统通用能力
      description: 返回系统管理已放入当前租户可用能力池、且租户管理已分配给当前用户、部门或角色的能力。租户管理员和系统管理员可查看当前租户能力池。
      tags:
        - Asset
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: size
          in: query
          schema:
            type: integer
            default: 10
        - name: sort
          in: query
          schema:
            type: string
            default: openedAt,desc
      responses:
        "200":
          description: 对当前主体开放的系统能力分页列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/SystemCapabilityAssetPageResponse"
  /api/tenants/{tenantId}/assets/mine:
    get:
      summary: 查询当前用户自建能力
      tags:
        - Asset
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: keyword
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: size
          in: query
          schema:
            type: integer
            default: 10
        - name: sort
          in: query
          schema:
            type: string
            default: updatedAt,desc
      responses:
        "200":
          description: 当前用户自建能力分页列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/MyAssetPageResponse"
    post:
      summary: 新建当前用户能力草稿
      description: 只允许创建提示词模板草稿或智能体模板草稿；Skill、MCP 和交付能力由系统管理登记，业务用户不能自建。
      tags:
        - Asset
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMyAssetRequest"
      responses:
        "200":
          description: 创建成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/MyAssetRow"
  /api/tenants/{tenantId}/assets/mine/{assetId}:
    get:
      summary: 获取我的能力详情
      tags:
        - Asset
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: assetId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 我的能力详情
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/MyAssetDetail"
    patch:
      summary: 编辑我的能力草稿
      description: 只有草稿状态可以编辑；提示词模板保存 promptContent，智能体模板保存 systemPrompt、systemPromptTemplateId、skillIds、mcpIds。
      tags:
        - Asset
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: assetId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMyAssetRequest"
      responses:
        "200":
          description: 编辑成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/MyAssetDetail"
    delete:
      summary: 删除我的能力
      description: 当前阶段允许删除自己创建的能力；后续接入流程引用关系后，已被草稿、发布流程或运行快照引用的能力应禁止删除。
      tags:
        - Asset
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: assetId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 删除成功
  /api/tenants/{tenantId}/assets/mine/{assetId}/publish:
    post:
      summary: 发布我的能力草稿
      description: 发布前校验提示词内容、智能体系统提示词，以及智能体引用的 Skill/MCP 是否仍对当前主体开放。
      tags:
        - Asset
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: assetId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 发布成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/MyAssetDetail"
  /api/tenants/{tenantId}/assets/mine/{assetId}/revert-to-draft:
    post:
      summary: 将已发布能力改回草稿
      description: 仅创建人可将已发布能力改回草稿后继续编辑；后续接入引用关系后，已被其他已发布资产或流程引用的能力应禁止回退。
      tags:
        - Asset
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: assetId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 改回草稿成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/MyAssetDetail"
  /api/tenants/{tenantId}/assets/mine/{assetId}/access:
    patch:
      summary: 配置自建能力读取与编辑权限
      description: 仅创建者可配置；读取和编辑分别支持 self、specified、all，编辑权限自动包含读取权限。
      tags:
        - Asset
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: assetId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAssetAccessRequest"
      responses:
        "200":
          description: 权限配置成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/MyAssetDetail"
  /api/tenants/{tenantId}/workbench/summary:
    get:
      summary: 获取业务工作台概览
      description: 业务工作台默认入口，聚合真实统计、当前用户的待办与最近任务运行。
      tags:
        - Workbench
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 业务工作台概览
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/WorkbenchSummary"
  /api/tenants/{tenantId}/workbench/available-workflows:
    get:
      summary: 查询全部已发布工作流并标记发起权限
      description: 返回当前租户内有冻结版本且入口未收回的全部流程；无读取或发起权限的流程仍展示，但 canLaunch=false。
      tags:
        - Workbench
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: keyword
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: size
          in: query
          schema:
            type: integer
            default: 12
        - name: sort
          in: query
          schema:
            type: string
            default: updatedAt,desc
      responses:
        "200":
          description: 当前用户可发起的已发布工作流分页列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/WorkbenchAvailableWorkflowPageResponse"
  /api/tenants/{tenantId}/workbench/available-workflows/{workflowId}/preview:
    get:
      summary: 预览可发起流程的发布节点
      description: 基于最新发布版本快照返回业务节点列表，供创建任务前查看流程步骤。
      tags:
        - Workbench
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: workflowId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 发布版本节点预览
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/WorkbenchAvailableWorkflowPreview"
  /api/tenants/{tenantId}/workbench/active-runs:
    get:
      summary: 查询当前用户未完成任务
      description: 任务中心“我的待办”列表，支持区分手工创建与定时任务创建的运行实例。
      tags:
