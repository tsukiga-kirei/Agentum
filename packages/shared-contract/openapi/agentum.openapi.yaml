                      data:
                        $ref: "#/components/schemas/AuditToolCallPageResponse"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    basicAuth:
      type: http
      scheme: basic
  schemas:
    ApiError:
      type: object
      properties:
        code:
          type: string
          example: WORKFLOW_NODE_CONFIG_INVALID
        message:
          type: string
          example: 智能体节点缺少输出变量配置
        details:
          type: object
      required:
        - code
        - message
    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          nullable: true
        error:
          anyOf:
            - $ref: "#/components/schemas/ApiError"
            - type: "null"
        requestId:
          type: string
      required:
        - success
        - data
        - error
        - requestId
    TenantOption:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        code:
          type: string
      required:
        - id
        - name
        - code
    SsoProviderOption:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        providerType:
          type: string
          enum: [oidc, basic, saml]
      required:
        - id
        - name
        - providerType
    BootstrapStatusResponse:
      type: object
      properties:
        needsSetup:
          type: boolean
      required:
        - needsSetup
    BootstrapAdminRequest:
      type: object
      properties:
        username:
          type: string
          pattern: "^[a-zA-Z0-9_]{3,100}$"
        displayName:
          type: string
          maxLength: 100
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 100
        email:
          type: string
          format: email
          maxLength: 255
      required:
        - username
        - displayName
        - password
    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
          format: password
        portal:
          type: string
          enum: [business, tenant_admin, system_admin]
        tenantId:
          type: string
          format: uuid
          nullable: true
      required:
        - username
        - password
        - portal
    LoginResponse:
      type: object
      properties:
        token:
          type: string
          nullable: true
          description: 短期 Access Token；/api/auth/me 响应中为 null
        user:
          $ref: "#/components/schemas/AuthUser"
        roles:
          type: array
          items:
            $ref: "#/components/schemas/RoleInfo"
        activeRole:
          $ref: "#/components/schemas/RoleInfo"
        permissions:
          type: array
          items:
            type: string
        menus:
          type: array
          items:
            $ref: "#/components/schemas/MenuItem"
      required:
        - user
        - roles
        - activeRole
        - permissions
        - menus
    SwitchRoleRequest:
      type: object
      properties:
        roleId:
          type: string
          format: uuid
      required:
        - roleId
    SwitchRoleResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/AuthUser"
        activeRole:
          $ref: "#/components/schemas/RoleInfo"
        permissions:
          type: array
          items:
            type: string
        menus:
          type: array
          items:
            $ref: "#/components/schemas/MenuItem"
      required:
        - token
        - user
        - activeRole
        - permissions
        - menus
    RoleInfo:
      type: object
      properties:
        id:
          type: string
          format: uuid
        role:
          type: string
          enum: [business, tenant_admin, system_admin]
        tenantId:
          type: string
          format: uuid
          nullable: true
        tenantName:
          type: string
          nullable: true
        label:
          type: string
      required:
        - id
        - role
        - tenantId
        - tenantName
        - label
    MenuItem:
      type: object
      properties:
        key:
          type: string
        label:
          type: string
        icon:
          type: string
        description:
          type: string
      required:
        - key
        - label
        - icon
        - description
    AuthUser:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        displayName:
          type: string
        email:
          type: string
        avatar:
          type: string
        role:
          type: string
          enum: [business, tenant_admin, system_admin]
        tenantId:
          type: string
          format: uuid
          nullable: true
        tenantName:
          type: string
        tenantCode:
          type: string
        organization:
          type: string
        lastLoginAt:
          type: string
      required:
        - id
        - username
        - displayName
        - email
        - avatar
        - role
        - tenantId
        - tenantName
        - tenantCode
        - organization
        - lastLoginAt
    PrincipalGrantUsageResponse:
      type: object
      properties:
        principalType:
          type: string
          enum: [role, department, user]
        principalId:
          type: string
          format: uuid
        pageGrantRows:
          type: integer
          format: int64
        resourceGrantRows:
          type: integer
          format: int64
      required:
        - principalType
        - principalId
        - pageGrantRows
        - resourceGrantRows
    TenantOrganizationOverview:
      type: object
      properties:
        tenantId:
          type: string
          format: uuid
        tenantName:
          type: string
        tenantCode:
          type: string
        members:
          type: array
          items:
            $ref: "#/components/schemas/OrganizationMember"
        departments:
          type: array
          items:
            $ref: "#/components/schemas/Department"
        roles:
          type: array
          items:
            $ref: "#/components/schemas/OrganizationRole"
        memberships:
          type: array
          items:
            $ref: "#/components/schemas/UserMembership"
      required:
        - tenantId
        - tenantName
        - tenantCode
        - members
        - departments
        - roles
        - memberships
    CreateMemberRequest:
      type: object
      properties:
        username:
          type: string
          maxLength: 100
        password:
          type: string
          minLength: 8
          maxLength: 80
        displayName:
          type: string
          maxLength: 100
        email:
          type: string
          maxLength: 255
        departmentId:
          type: string
          format: uuid
          nullable: true
        roleId:
          type: string
          format: uuid
      required:
        - username
        - password
        - displayName
        - roleId
    MemberImportResult:
      type: object
      properties:
        total:
          type: integer
          format: int32
        success:
          type: integer
          format: int32
        failedRows:
          type: array
          items:
            $ref: "#/components/schemas/MemberImportFailedRow"
      required:
        - total
        - success
        - failedRows
    MemberImportFailedRow:
      type: object
      properties:
        rowNumber:
          type: integer
