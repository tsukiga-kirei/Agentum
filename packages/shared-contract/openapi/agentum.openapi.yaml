          maxLength: 120
        principals:
          type: array
          items:
            $ref: "#/components/schemas/GrantPrincipal"
        pages:
          type: array
          items:
            $ref: "#/components/schemas/PageGrantItem"
        createdAt:
          type: string
      required:
