openapi: 3.1.0
info:
  title: Agentum API
  version: 0.1.0
  description: Agentum 平台 API 契约占位文件。
servers:
  - url: http://localhost:8080
    description: 本地开发环境
paths:
  /api/public/tenants:
    get:
      summary: 获取公开租户列表
      description: 登录页使用的活跃租户轻量列表。公网 SaaS 场景后续应替换为租户编码或域名识别。
      tags:
        - Auth
      responses:
        "200":
          description: 活跃租户列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/TenantOption"
  /api/auth/login:
    post:
      summary: 登录并建立活跃入口上下文
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: 登录成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/LoginResponse"
        "400":
          description: 请求参数不完整或租户不可用
        "401":
          description: 用户名、密码或登录状态不正确
        "403":
          description: 用户没有所选入口权限
  /api/auth/me:
    get:
      summary: 获取当前登录用户
      tags:
        - Auth
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 当前用户上下文
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/LoginResponse"
        "401":
          description: 未登录或令牌无效
  /api/auth/switch-role:
    put:
      summary: 切换当前活跃角色
      tags:
        - Auth
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SwitchRoleRequest"
      responses:
        "200":
          description: 切换成功，返回新 token、用户上下文、活跃角色和菜单
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/SwitchRoleResponse"
        "401":
          description: 未登录或令牌无效
        "403":
          description: 目标角色不属于当前用户
  /api/auth/logout:
    post:
      summary: 退出登录
      tags:
        - Auth
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 已退出
  /api/tenants/{tenantId}/assets/summary:
    get:
      summary: 获取能力资产总览
      description: 业务侧能力资产页使用，聚合系统管理开放给租户的能力、租户管理已分配给当前主体的能力和当前用户自建能力数量。
      tags:
        - Asset
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 能力资产总览
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AssetSummary"
  /api/tenants/{tenantId}/assets/system-capabilities:
    get:
      summary: 查询对当前主体开放的系统通用能力
      description: 返回系统管理已放入当前租户可用能力池、且租户管理已分配给当前用户、部门或角色的能力。租户管理员和系统管理员可查看当前租户能力池。
      tags:
        - Asset
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: size
          in: query
          schema:
            type: integer
            default: 10
        - name: sort
          in: query
          schema:
            type: string
            default: openedAt,desc
      responses:
        "200":
          description: 对当前主体开放的系统能力分页列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/SystemCapabilityAssetPageResponse"
  /api/tenants/{tenantId}/assets/mine:
    get:
      summary: 查询当前用户自建能力
      tags:
        - Asset
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: keyword
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: size
          in: query
          schema:
            type: integer
            default: 10
        - name: sort
          in: query
          schema:
            type: string
            default: updatedAt,desc
      responses:
        "200":
          description: 当前用户自建能力分页列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/MyAssetPageResponse"
    post:
      summary: 新建当前用户能力草稿
      description: 只允许创建提示词模板草稿或智能体模板草稿；Skill、MCP 和交付能力由系统管理登记，业务用户不能自建。
      tags:
        - Asset
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMyAssetRequest"
      responses:
        "200":
          description: 创建成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/MyAssetRow"
  /api/tenants/{tenantId}/assets/mine/{assetId}:
    get:
      summary: 获取我的能力详情
      tags:
        - Asset
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: assetId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 我的能力详情
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/MyAssetDetail"
    patch:
      summary: 编辑我的能力草稿
      description: 只有草稿状态可以编辑；提示词模板保存 promptContent，智能体模板保存 systemPrompt、skillIds、mcpIds。
      tags:
        - Asset
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: assetId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMyAssetRequest"
      responses:
        "200":
          description: 编辑成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/MyAssetDetail"
    delete:
      summary: 删除我的能力
      description: 当前阶段允许删除自己创建的能力；后续接入流程引用关系后，已被草稿、发布流程或运行快照引用的能力应禁止删除。
      tags:
        - Asset
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: assetId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 删除成功
  /api/tenants/{tenantId}/assets/mine/{assetId}/publish:
    post:
      summary: 发布我的能力草稿
      description: 发布前校验提示词内容、智能体系统提示词，以及智能体引用的 Skill/MCP 是否仍对当前主体开放。
      tags:
        - Asset
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: assetId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 发布成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/MyAssetDetail"
  /api/tenants/{tenantId}/workbench/summary:
    get:
      summary: 获取业务工作台概览
      description: 业务工作台默认入口，聚合真实统计、当前用户的待办与最近任务。运行态尚未上线前，pendingTodos / recentRuns 固定为空，并通过 runtimeAvailable=false 标记状态。
      tags:
        - Workbench
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 业务工作台概览
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/WorkbenchSummary"
  /api/tenants/{tenantId}/workbench/available-workflows:
    get:
      summary: 查询当前用户可发起的已发布工作流
      description: 返回租户内 status=published 的工作流定义及其最新发布版本号。第一阶段不区分“可发起范围”，后续接入资源范围后再细化。
      tags:
        - Workbench
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: keyword
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: size
          in: query
          schema:
            type: integer
            default: 12
        - name: sort
          in: query
          schema:
            type: string
            default: updatedAt,desc
      responses:
        "200":
          description: 当前用户可发起的已发布工作流分页列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/WorkbenchAvailableWorkflowPageResponse"
  /api/tenants/{tenantId}/workflows/drafts:
    get:
      summary: 查询工作流草稿列表
      description: 流程设计页使用的租户内工作流定义草稿列表，后端按租户上下文和流程设计权限复核。
      tags:
        - Workflow
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: keyword
          in: query
          schema:
            type: string
        - name: scope
          in: query
          description: 工作流范围，all 表示当前租户可见流程，shared 表示他人开放给当前用户参与设计的流程，mine 表示当前创建人维护的流程
          schema:
            type: string
            enum: [all, shared, mine]
            default: all
        - name: status
          in: query
          description: 工作流发布状态筛选，all 表示不过滤状态
          schema:
            type: string
            enum: [all, draft, published, review]
            default: all
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: size
          in: query
          schema:
            type: integer
            default: 10
        - name: sort
          in: query
          schema:
            type: string
            default: updatedAt,desc
      responses:
        "200":
          description: 工作流草稿分页列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/WorkflowDraftPageResponse"
    post:
      summary: 新建工作流草稿
      tags:
        - Workflow
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkflowDraftRequest"
      responses:
        "200":
          description: 新建成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/WorkflowDraftRow"
  /api/tenants/{tenantId}/workflows/drafts/{workflowId}:
    get:
      summary: 获取工作流草稿详情
      tags:
        - Workflow
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: workflowId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 草稿详情
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/WorkflowDraftDetail"
  /api/tenants/{tenantId}/workflows/drafts/{workflowId}/graph:
    put:
      summary: 保存工作流草稿节点与边
      tags:
        - Workflow
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: workflowId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveWorkflowDraftGraphRequest"
      responses:
        "200":
          description: 保存成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/WorkflowDraftDetail"
  /api/tenants/{tenantId}/workflows/drafts/{workflowId}/publish-validation:
    post:
      summary: 校验工作流草稿是否满足最小发布条件
      description: 当前阶段只校验图结构、起止节点、连通性和变量引用；真正发布时仍需再次复核能力授权与版本快照。
      tags:
        - Workflow
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: workflowId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 发布校验结果
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/WorkflowPublishValidationResult"
  /api/tenants/{tenantId}/workflows/drafts/{workflowId}/publish:
    post:
      summary: 正式发布工作流草稿
      description: 发布时重新执行后端校验，并把节点、边和变量声明冻结为不可变版本快照。
      tags:
        - Workflow
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: workflowId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 发布成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/WorkflowPublishResult"
  /api/admin/tenants/{tenantId}/organization/overview:
    get:
      summary: 获取租户人员组织概览
      description: 租户管理页使用的租户人员、部门、角色和成员关系聚合视图。
      tags:
        - Organization
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 租户人员组织概览
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/TenantOrganizationOverview"
        "401":
          description: 未登录或令牌无效
        "403":
          description: 当前账号不能管理该租户
        "404":
          description: 租户不存在或已停用
  /api/admin/tenants/{tenantId}/organization/members:
    post:
      summary: 新增租户成员
      description: 创建用户账号并分配当前租户内部门和角色。后端会校验租户、部门、角色归属。
      tags:
        - Organization
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMemberRequest"
      responses:
        "200":
          description: 新增成功并返回最新人员组织概览
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/TenantOrganizationOverview"
        "400":
          description: 请求参数不完整或部门、角色不可用
        "401":
          description: 未登录或令牌无效
        "403":
          description: 当前账号不能管理该租户
        "409":
          description: 用户名已存在
  /api/admin/tenants/{tenantId}/organization/departments:
    post:
      summary: 新增租户部门
      description: 创建当前租户内部门，可选上级部门。部门编码由后端自动生成，后端会校验上级部门归属。
      tags:
        - Organization
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDepartmentRequest"
      responses:
        "200":
          description: 新增成功并返回最新人员组织概览
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/TenantOrganizationOverview"
        "400":
          description: 请求参数不完整或上级部门不可用
        "401":
          description: 未登录或令牌无效
        "403":
          description: 当前账号不能管理该租户
  /api/admin/tenants/{tenantId}/organization/departments/{departmentId}:
    patch:
      summary: 更新租户部门
      description: 更新当前租户内部门名称、上级部门和排序，部门编码不可由前端修改。
      tags:
        - Organization
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: departmentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDepartmentRequest"
      responses:
        "200":
          description: 更新成功并返回最新人员组织概览
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/TenantOrganizationOverview"
        "400":
          description: 上级部门不可用或循环引用
        "404":
          description: 部门不存在
    delete:
      summary: 删除租户部门
      description: 仅当部门没有成员关系、下级部门和授权记录时允许彻底删除。停用部门请使用状态接口，停用后的部门仍会在组织树中展示用于追溯。
      tags:
        - Organization
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: departmentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "400":
          description: 部门仍有关联成员、下级部门或授权记录
        "404":
          description: 部门不存在
