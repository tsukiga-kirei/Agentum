openapi: 3.1.0
info:
  title: Agentum API
  version: 0.1.0
  description: Agentum 平台 API 契约占位文件。
servers:
  - url: http://localhost:8080
    description: 本地开发环境
paths:
  /api/public/tenants:
    get:
      summary: 获取公开租户列表
      description: 登录页使用的活跃租户轻量列表。公网 SaaS 场景后续应替换为租户编码或域名识别。
      tags:
        - Auth
      responses:
        "200":
          description: 活跃租户列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/TenantOption"
  /api/auth/login:
    post:
      summary: 登录并建立活跃入口上下文
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: 登录成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/LoginResponse"
        "400":
          description: 请求参数不完整或租户不可用
        "401":
          description: 用户名、密码或登录状态不正确
        "403":
          description: 用户没有所选入口权限
  /api/auth/me:
    get:
      summary: 获取当前登录用户
      tags:
        - Auth
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 当前用户上下文
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AuthUser"
        "401":
          description: 未登录或令牌无效
  /api/auth/logout:
    post:
      summary: 退出登录
      tags:
        - Auth
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 已退出
  /api/admin/tenants/{tenantId}/organization/overview:
    get:
      summary: 获取租户人员组织概览
      description: 租户管理页使用的租户人员、部门、角色和成员关系聚合视图。
      tags:
        - Organization
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 租户人员组织概览
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/TenantOrganizationOverview"
        "401":
          description: 未登录或令牌无效
        "403":
          description: 当前账号不能管理该租户
        "404":
          description: 租户不存在或已停用
  /api/admin/tenants/{tenantId}/organization/members:
    post:
      summary: 新增租户成员
      description: 创建用户账号并分配当前租户内部门、角色和空间。后端会校验租户、部门、角色归属。
      tags:
        - Organization
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMemberRequest"
      responses:
        "200":
          description: 新增成功并返回最新人员组织概览
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/TenantOrganizationOverview"
        "400":
          description: 请求参数不完整或部门、角色不可用
        "401":
          description: 未登录或令牌无效
        "403":
          description: 当前账号不能管理该租户
        "409":
          description: 用户名已存在
  /api/admin/tenants/{tenantId}/organization/departments:
    post:
      summary: 新增租户部门
      description: 创建当前租户内部门，可选上级部门。后端会校验上级部门归属。
      tags:
        - Organization
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDepartmentRequest"
      responses:
        "200":
          description: 新增成功并返回最新人员组织概览
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/TenantOrganizationOverview"
        "400":
          description: 请求参数不完整或上级部门不可用
        "401":
          description: 未登录或令牌无效
        "403":
          description: 当前账号不能管理该租户
  /api/admin/tenants/{tenantId}/organization/memberships/{membershipId}/role:
    patch:
      summary: 调整成员角色
      description: 更新成员关系中的角色，后端会校验目标角色归属当前租户且为启用状态。
      tags:
        - Organization
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: membershipId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMembershipRoleRequest"
      responses:
        "200":
          description: 更新成功并返回最新人员组织概览
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/TenantOrganizationOverview"
        "400":
          description: 角色不可用或不属于当前租户
        "401":
          description: 未登录或令牌无效
        "403":
          description: 当前账号不能管理该租户
        "404":
          description: 成员关系不存在或已停用
  /api/admin/tenants/{tenantId}/organization/memberships/{membershipId}/department:
    patch:
      summary: 调整成员部门
      description: 更新成员关系中的部门，可置空。后端会校验目标部门归属当前租户且为启用状态。
      tags:
        - Organization
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: membershipId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMembershipDepartmentRequest"
      responses:
        "200":
          description: 更新成功并返回最新人员组织概览
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/TenantOrganizationOverview"
        "400":
          description: 部门不可用或不属于当前租户
        "401":
          description: 未登录或令牌无效
        "403":
          description: 当前账号不能管理该租户
        "404":
          description: 成员关系不存在或已停用
  /api/system/summary:
    get:
      summary: 系统管理概览统计
      description: 平台级统计，仅供 system_admin 使用。
      tags:
        - System
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 统计信息
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/SystemSummary"
        "401":
          description: 未登录或令牌无效
        "403":
          description: 当前账号不是系统管理员
  /api/system/tenants:
    get:
      summary: 列出全部租户
      tags:
        - System
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 租户列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/SystemTenantRow"
        "401":
          description: 未登录或令牌无效
        "403":
          description: 当前账号不是系统管理员
  /api/system/tenants/{tenantId}/status:
    patch:
      summary: 更新租户可用状态
      description: active 表示正常；suspended 表示暂停登录与业务写入。公开租户列表仍只展示 active。
      tags:
        - System
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTenantStatusRequest"
      responses:
        "200":
          description: 更新后的租户摘要
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/SystemTenantRow"
        "400":
          description: 状态取值非法
        "401":
          description: 未登录或令牌无效
        "403":
          description: 当前账号不是系统管理员
        "404":
          description: 租户不存在
  /api/system/model-providers:
    get:
      summary: 列出模型供应商
      tags:
        - System
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 模型供应商列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/ModelProviderRow"
        "401":
          description: 未登录或令牌无效
        "403":
          description: 当前账号不是系统管理员
    post:
      summary: 注册模型供应商
      tags:
        - System
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateModelProviderRequest"
      responses:
        "200":
          description: 已创建的供应商
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ModelProviderRow"
        "401":
          description: 未登录或令牌无效
        "403":
          description: 当前账号不是系统管理员
  /api/system/capabilities:
    get:
      summary: 列出系统级能力
      tags:
        - System
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 能力列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/SystemCapabilityRow"
        "401":
          description: 未登录或令牌无效
        "403":
          description: 当前账号不是系统管理员
    post:
      summary: 注册系统级能力
      tags:
        - System
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSystemCapabilityRequest"
      responses:
        "200":
          description: 已创建的能力
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/SystemCapabilityRow"
        "401":
          description: 未登录或令牌无效
        "403":
          description: 当前账号不是系统管理员
        "409":
          description: 能力编码与版本已存在
  /api/system/tenant-capability-grants:
    get:
      summary: 列出租户能力授权
      tags:
        - System
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 授权列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/TenantCapabilityGrantRow"
        "401":
          description: 未登录或令牌无效
        "403":
          description: 当前账号不是系统管理员
    post:
      summary: 新增租户能力授权
      tags:
        - System
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTenantCapabilityGrantRequest"
      responses:
        "200":
          description: 已创建的授权
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/TenantCapabilityGrantRow"
        "400":
          description: 租户或能力不存在
        "401":
          description: 未登录或令牌无效
        "403":
          description: 当前账号不是系统管理员
        "409":
          description: 授权记录已存在
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ApiError:
      type: object
      properties:
        code:
          type: string
          example: WORKFLOW_NODE_CONFIG_INVALID
        message:
          type: string
          example: 智能体节点缺少输出变量配置
        details:
          type: object
      required:
        - code
        - message
    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          nullable: true
        error:
          anyOf:
            - $ref: "#/components/schemas/ApiError"
            - type: "null"
        requestId:
          type: string
      required:
        - success
        - data
        - error
        - requestId
    TenantOption:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        code:
          type: string
      required:
        - id
        - name
        - code
    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
          format: password
        portal:
          type: string
          enum: [business, tenant_admin, system_admin]
        tenantId:
          type: string
          format: uuid
          nullable: true
      required:
        - username
        - password
        - portal
    LoginResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/AuthUser"
      required:
        - token
        - user
    AuthUser:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        displayName:
          type: string
        email:
          type: string
        avatar:
          type: string
        role:
          type: string
          enum: [system_admin, tenant_admin, designer, agent_admin, capability_admin, reviewer, executor, observer]
        tenantId:
          type: string
          format: uuid
          nullable: true
        tenantName:
          type: string
        tenantCode:
          type: string
        organization:
          type: string
        space:
          type: string
        lastLoginAt:
          type: string
      required:
        - id
        - username
        - displayName
        - email
        - avatar
        - role
        - tenantId
        - tenantName
        - tenantCode
        - organization
        - space
        - lastLoginAt
    TenantOrganizationOverview:
      type: object
      properties:
        tenantId:
          type: string
          format: uuid
        tenantName:
          type: string
        tenantCode:
          type: string
        members:
          type: array
          items:
            $ref: "#/components/schemas/OrganizationMember"
        departments:
          type: array
          items:
            $ref: "#/components/schemas/Department"
        roles:
          type: array
          items:
            $ref: "#/components/schemas/OrganizationRole"
        memberships:
          type: array
          items:
            $ref: "#/components/schemas/UserMembership"
      required:
        - tenantId
        - tenantName
        - tenantCode
        - members
        - departments
        - roles
        - memberships
    CreateMemberRequest:
      type: object
      properties:
        username:
          type: string
          maxLength: 100
        password:
          type: string
          minLength: 8
          maxLength: 80
        displayName:
          type: string
          maxLength: 100
        email:
          type: string
          maxLength: 255
        departmentId:
          type: string
          format: uuid
          nullable: true
        roleId:
          type: string
          format: uuid
        spaceCode:
          type: string
          maxLength: 80
      required:
        - username
        - password
        - displayName
        - roleId
    CreateDepartmentRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 160
        code:
          type: string
          maxLength: 80
        parentId:
          type: string
          format: uuid
          nullable: true
        sortOrder:
          type: integer
      required:
        - name
    UpdateMembershipRoleRequest:
      type: object
      properties:
        roleId:
          type: string
          format: uuid
      required:
        - roleId
    UpdateMembershipDepartmentRequest:
      type: object
      properties:
        departmentId:
          type: string
          format: uuid
          nullable: true
    OrganizationMember:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        displayName:
          type: string
        email:
          type: string
        status:
          type: string
        lastLoginAt:
          type: string
      required:
        - id
        - username
        - displayName
        - email
        - status
        - lastLoginAt
    Department:
      type: object
      properties:
        id:
          type: string
          format: uuid
        parentId:
          type: string
          format: uuid
          nullable: true
        name:
          type: string
        code:
          type: string
        sortOrder:
          type: integer
        status:
          type: string
      required:
        - id
        - parentId
        - name
        - code
        - sortOrder
        - status
    OrganizationRole:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        scope:
          type: string
        status:
          type: string
      required:
        - id
        - code
        - name
        - scope
        - status
    UserMembership:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        userDisplayName:
          type: string
        departmentId:
          type: string
          format: uuid
          nullable: true
        departmentName:
          type: string
        roleId:
          type: string
          format: uuid
        roleName:
          type: string
        roleCode:
          type: string
        spaceCode:
          type: string
        defaultMembership:
          type: boolean
        status:
          type: string
      required:
        - id
        - userId
        - userDisplayName
        - departmentId
        - departmentName
        - roleId
        - roleName
        - roleCode
        - spaceCode
        - defaultMembership
        - status
    SystemSummary:
      type: object
      properties:
        tenantTotal:
          type: integer
          format: int64
        tenantActive:
          type: integer
          format: int64
        modelProviderTotal:
          type: integer
          format: int64
        systemCapabilityTotal:
          type: integer
          format: int64
        tenantCapabilityGrantTotal:
          type: integer
          format: int64
      required:
        - tenantTotal
        - tenantActive
        - modelProviderTotal
        - systemCapabilityTotal
        - tenantCapabilityGrantTotal
    SystemTenantRow:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        code:
          type: string
        status:
          type: string
      required:
        - id
        - name
        - code
        - status
    UpdateTenantStatusRequest:
      type: object
      properties:
        status:
          type: string
          description: active 或 suspended
      required:
        - status
    ModelProviderRow:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        providerType:
          type: string
        baseUrl:
          type: string
          nullable: true
        defaultModel:
          type: string
          nullable: true
        status:
          type: string
      required:
        - id
        - name
        - providerType
        - status
    CreateModelProviderRequest:
      type: object
      properties:
        name:
          type: string
        providerType:
          type: string
        baseUrl:
          type: string
        defaultModel:
          type: string
        status:
          type: string
      required:
        - name
        - providerType
    SystemCapabilityRow:
      type: object
      properties:
        id:
          type: string
          format: uuid
        capabilityType:
          type: string
        name:
          type: string
        code:
          type: string
        version:
          type: string
        riskLevel:
          type: string
        status:
          type: string
      required:
        - id
        - capabilityType
        - name
        - code
        - version
        - riskLevel
        - status
    CreateSystemCapabilityRequest:
      type: object
      properties:
        capabilityType:
          type: string
        name:
          type: string
        code:
          type: string
        version:
          type: string
        riskLevel:
          type: string
        status:
          type: string
      required:
        - capabilityType
        - name
        - code
    TenantCapabilityGrantRow:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
