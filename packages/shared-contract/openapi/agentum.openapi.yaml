    DocumentDeliveryStyle:
      type: object
      description: Word 文档交付样式。字号可填 pt 数字或中文字号名（如四号、小四），段前段后单位由 paragraphSpacingUnit 决定，页边距为 cm，首行缩进为字符数。覆盖优先级：全局代码默认 < 系统能力 defaultStyle < 节点全局样式 < 多级标题规则 < 逐段个性化规则。
      properties:
        chineseFont:
          type: string
          default: 宋体
        latinFont:
          type: string
          default: Times New Roman
        numberFont:
          type: string
          default: Times New Roman
          description: 正文数字字体。
        bodyFontSize:
          oneOf:
            - type: integer
            - type: string
          default: 12
        bodyAlignment:
          type: string
          enum: [left, center, right, both]
          default: left
          description: 正文段落对齐方式（左/居中/右/两端对齐）。
        heading1Alignment:
          type: string
          enum: [left, center, right, both]
          default: left
          description: 一级标题对齐方式。
        heading2Alignment:
          type: string
          enum: [left, center, right, both]
          default: left
          description: 二级标题对齐方式。
        heading3Alignment:
          type: string
          enum: [left, center, right, both]
          default: left
          description: 三级标题对齐方式。
        heading4Alignment:
          type: string
          enum: [left, center, right, both]
          default: left
          description: 四级标题对齐方式。
        heading5Alignment:
          type: string
          enum: [left, center, right, both]
          default: left
          description: 五级标题对齐方式。
        heading1FontSize:
          oneOf:
            - type: integer
            - type: string
          default: 16
        heading2FontSize:
          oneOf:
            - type: integer
            - type: string
          default: 14
        heading3FontSize:
          oneOf:
            - type: integer
            - type: string
          default: 13
        heading4FontSize:
          oneOf:
            - type: integer
            - type: string
          default: 0
          description: 四级标题字号，0 表示继承三级标题。
        heading5FontSize:
          oneOf:
            - type: integer
            - type: string
          default: 0
          description: 五级标题字号，0 表示继承三级标题。
        heading1ChineseFont:
          type: string
          description: 一级标题中文字体，留空继承正文。
        heading1LatinFont:
          type: string
          description: 一级标题西文字体，留空继承正文。
        heading1NumberFont:
          type: string
          description: 一级标题数字字体，留空继承正文。
        heading2ChineseFont:
          type: string
          description: 二级标题中文字体，留空继承正文。
        heading2LatinFont:
          type: string
          description: 二级标题西文字体，留空继承正文。
        heading2NumberFont:
          type: string
          description: 二级标题数字字体，留空继承正文。
        heading3ChineseFont:
          type: string
          description: 三级标题中文字体，留空继承正文。
        heading3LatinFont:
          type: string
          description: 三级标题西文字体，留空继承正文。
        heading3NumberFont:
          type: string
          description: 三级标题数字字体，留空继承正文。
        heading4ChineseFont:
          type: string
          description: 四级标题中文字体，留空继承三级标题。
        heading4LatinFont:
          type: string
          description: 四级标题西文字体，留空继承三级标题。
        heading4NumberFont:
          type: string
          description: 四级标题数字字体，留空继承三级标题。
        heading5ChineseFont:
          type: string
          description: 五级标题中文字体，留空继承三级标题。
        heading5LatinFont:
          type: string
          description: 五级标题西文字体，留空继承三级标题。
        heading5NumberFont:
          type: string
          description: 五级标题数字字体，留空继承三级标题。
        heading1Bold:
          type: boolean
          default: true
          description: 一级标题是否加粗。
        heading2Bold:
          type: boolean
          default: true
          description: 二级标题是否加粗。
        heading3Bold:
          type: boolean
          default: true
          description: 三级标题是否加粗。
        heading4Bold:
          type: boolean
          default: true
          description: 四级标题是否加粗。
        heading5Bold:
          type: boolean
          default: true
          description: 五级标题是否加粗。
        tableChineseFont:
          type: string
          description: 表格中文字体，留空继承正文。
        tableLatinFont:
          type: string
          description: 表格西文字体，留空继承正文。
        tableNumberFont:
          type: string
          description: 表格数字字体，留空继承正文。
        tableFontSize:
          oneOf:
            - type: integer
            - type: string
          default: 0
          description: 表格字号，0 表示继承正文。
        tableCellAlignment:
          type: string
          enum: [left, center, right, both]
          default: left
          description: 表格单元格水平对齐方式。
        tableCellVerticalAlignment:
          type: string
          enum: [top, center, bottom]
          default: center
          description: 表格单元格垂直对齐方式。
        tableCellPaddingVerticalPt:
          type: number
          minimum: 0
          maximum: 20
          default: 1.5
          description: 表格单元格上下内边距（pt），让文字与框线留出间距。
        tableHeaderBold:
          type: boolean
          default: false
          description: 表格首行是否加粗；不再附加首行底色。
        tableBorders:
          type: boolean
          default: true
          description: 是否使用默认全边框。
        tableBorderWidthPt:
          type: number
          minimum: 0.25
          maximum: 6
          default: 0.5
          description: 全边框磅数，仅 tableBorders=true 时生效。
        tableLineSpacingMode:
          type: string
          enum: [multiple, exact]
          default: multiple
          description: 表格行距类型。
        tableLineSpacing:
          type: number
          default: 1
          description: 表格倍数行距。
        tableLineSpacingPt:
          type: integer
          default: 12
          minimum: 6
          maximum: 72
          description: 表格固定磅值行距。
        lineSpacingMode:
          type: string
          enum: [multiple, exact]
          default: multiple
          description: 行距类型；multiple 为倍数，exact 为固定磅值。
        lineSpacing:
          type: number
          default: 1.5
          description: 倍数行距，lineSpacingMode=multiple 时生效。
        lineSpacingPt:
          type: integer
          default: 18
          minimum: 6
          maximum: 72
          description: 固定磅值行距，lineSpacingMode=exact 时生效。
        firstLineIndentMode:
          type: string
          enum: [chars, cm]
          default: chars
          description: 首行缩进单位，chars 为字符数，cm 为厘米。
        firstLineIndentChars:
          type: number
          default: 2
        firstLineIndentCm:
          type: number
          default: 0.75
          description: 首行缩进厘米数，firstLineIndentMode=cm 时生效。
        orderedListIndentMode:
          type: string
          enum: [body, none, hanging]
          default: body
          description: 有序列表缩进方式；body 继承正文首行缩进，none 不使用缩进，hanging 使用独立悬挂缩进。
        orderedListLeftIndentChars:
          type: number
          minimum: 0
          maximum: 12
          default: 3
          description: 有序列表左缩进字符数，仅 orderedListIndentMode=hanging 时生效。
        orderedListHangingIndentChars:
          type: number
          minimum: 0
          maximum: 12
          default: 1.5
          description: 有序列表悬挂缩进字符数，仅 orderedListIndentMode=hanging 时生效。
        unorderedListIndentMode:
          type: string
          enum: [body, none, hanging]
          default: body
          description: 无序列表缩进方式；body 继承正文首行缩进，none 不使用缩进，hanging 使用独立悬挂缩进。
        unorderedListLeftIndentChars:
          type: number
          minimum: 0
          maximum: 12
          default: 3
          description: 无序列表左缩进字符数，仅 unorderedListIndentMode=hanging 时生效。
        unorderedListHangingIndentChars:
          type: number
          minimum: 0
          maximum: 12
          default: 1.5
          description: 无序列表悬挂缩进字符数，仅 unorderedListIndentMode=hanging 时生效。
        paragraphSpacingUnit:
          type: string
          enum: [line, pt, cm, mm]
          default: pt
          description: 段前段后间距单位。
        paragraphSpacingBefore:
          type: number
          default: 0
          description: 正文段前间距，单位由 paragraphSpacingUnit 决定。
        paragraphSpacingAfter:
          type: number
          default: 6
          description: 正文段后间距，单位由 paragraphSpacingUnit 决定。
        marginTopCm:
          type: number
          default: 2.54
        marginBottomCm:
          type: number
          default: 2.54
        marginLeftCm:
          type: number
          default: 3.18
        marginRightCm:
          type: number
          default: 3.18
        titleCentered:
          type: boolean
          default: false
          description: 是否将文档第一个内容段单独居中；优先级低于逐段个性化规则，高于标题级别对齐。
        headingFirstLineIndent:
          type: boolean
          default: false
          description: 是否对 Markdown 标题应用首行缩进。
        paragraphRules:
          type: array
          description: 逐段个性化规则，仅作用于非表格段落，优先级高于全局样式。空字段表示继承。
          items:
            $ref: '#/components/schemas/DocumentParagraphRule'
    DocumentParagraphRule:
      type: object
      description: 针对指定段落（非表格）的个性化排版规则。空字符串字段表示继承，仅显式设置项参与覆盖。
      properties:
        id:
          type: string
          description: 前端用于列表渲染的本地标识。
        targetType:
          type: string
          enum: [index, first, second, third, last, secondLast]
          default: index
          description: 目标段落选择方式；index 表示按 targetIndex 指定段号。
        targetIndex:
          type: integer
          minimum: 1
          default: 1
          description: 目标段号（1 基，仅统计非表格段落），targetType=index 时生效。
        alignment:
          type: string
          enum: ['', left, center, right, both]
          default: ''
          description: 段落对齐方式，空表示继承。
        firstLineIndentMode:
          type: string
          enum: ['', none, chars, cm]
          default: ''
          description: 首行缩进方式，空表示继承，none 表示取消缩进。
        firstLineIndentChars:
          type: number
          default: 2
        firstLineIndentCm:
          type: number
          default: 0.75
        chineseFont:
          type: string
          description: 中文字体，空表示继承。
        latinFont:
          type: string
          description: 西文字体，空表示继承。
        numberFont:
          type: string
          description: 数字字体，空表示继承。
        fontSize:
          oneOf:
            - type: integer
            - type: string
          default: 0
          description: 字号，0 表示继承。
        spacingUnit:
          type: string
          enum: ['', line, pt, cm, mm]
          default: ''
          description: 段前段后间距单位，空表示不覆盖间距。
        spacingBefore:
          type: number
          default: 0
        spacingAfter:
          type: number
          default: 0
        blankLinesBefore:
          type: integer
          minimum: 0
          default: 0
          description: 段前插入的空段落数量，等价于手动回车形成的空行。
        blankLinesAfter:
          type: integer
          minimum: 0
          default: 0
          description: 段后插入的空段落数量，等价于手动回车形成的空行。
        blankLineHeightMode:
          type: string
          enum: [target, body, exact]
          default: target
          description: 本规则插入空段落的高度方式；target 继承目标段落有效字号与正文行距，body 使用正文，exact 使用固定磅值。
        blankLineHeightPt:
          type: integer
          minimum: 1
          maximum: 144
          default: 18
          description: 本规则插入空段落的固定高度（pt），仅 blankLineHeightMode=exact 时生效。
    WordDocumentPreviewRequest:
      type: object
      properties:
        capabilityId:
          type: string
          format: uuid
          description: 当前主体可用的 Word 文档交付能力 ID；设计态预览也必须校验能力分配。
        markdown:
          type: string
          description: 设计态预览使用的 Markdown 样例。
        fileName:
          type: string
          description: 生成文件名，后端会兜底补齐 docx 后缀。
        title:
          type: string
          description: 文档标题；为空时使用文件名。
        style:
          $ref: "#/components/schemas/DocumentDeliveryStyle"
      required:
        - capabilityId
        - markdown
        - fileName
        - style
    ExcelWorkbookDeliveryConfig:
      type: object
      description: Excel 工作簿交付节点配置。每个 Sheet 使用正文模板渲染模型输出，再宽容识别 Markdown 表格、CSV/TSV/JSON 代码块、编号/项目列表、键值块和普通文本；默认单元格为纯文本，列/行/单元格规则命中后才尝试转换类型，转换失败自动回退文本。
      properties:
        deliveryMode:
          type: string
          enum: [capability]
        deliveryCapabilityId:
          type: string
          format: uuid
        deliveryType:
          type: string
          enum: [excel_workbook]
        documentKind:
          type: string
          enum: [excel]
        fileNameTemplate:
          type: string
          default: 交付表格-{{runNumber}}.xlsx
        excelSheets:
          type: array
          items:
            $ref: "#/components/schemas/ExcelSheetTemplate"
      required:
        - deliveryMode
        - deliveryCapabilityId
        - deliveryType
        - documentKind
        - fileNameTemplate
        - excelSheets
    ExcelSheetTemplate:
      type: object
      properties:
        id:
          type: string
          description: 前端用于列表渲染的本地标识。
        name:
          type: string
          description: Sheet 页名称，后端会过滤 Excel 不支持的字符并做重名去重。
        startCell:
          type: string
          default: A1
          description: 渲染起始单元格。
        defaultCellType:
          type: string
          enum: [text, number, currency, percent, date, datetime, boolean]
          default: text
        bodyTemplate:
          type: string
          description: Sheet 正文模板，可使用 {{变量名}} 引用上游模型输出或运行变量。
        tableStyle:
          $ref: "#/components/schemas/ExcelTableStyle"
        columnRules:
          type: array
          items:
            $ref: "#/components/schemas/ExcelColumnRule"
        rowRules:
          type: array
          items:
            $ref: "#/components/schemas/ExcelRowRule"
        cellRules:
          type: array
          items:
            $ref: "#/components/schemas/ExcelCellRule"
      required:
        - name
        - bodyTemplate
    ExcelTableStyle:
      type: object
      properties:
        headerBold:
          type: boolean
          default: true
        freezeHeader:
          type: boolean
          default: true
        autoFilter:
          type: boolean
          default: true
        fontName:
          type: string
          description: 表格默认字体，留空使用 Excel 默认字体。
        fontSize:
          type: integer
          minimum: 0
          default: 0
          description: 表格默认字号，0 表示不覆盖。
        horizontalAlignment:
          type: string
          enum: ['', left, center, right]
          default: ''
          description: 表格默认水平对齐。
    ExcelColumnRule:
      type: object
      description: 按列字母 (A/B/C) 或列名称定位列，并通过 applyFromRow 控制从第几行开始向下应用格式；按名称时第 1 行用于匹配列名；类型转换失败时数据单元格回退为文本。
      properties:
        id:
          type: string
        target:
          type: string
          enum: [letter, name]
          default: letter
          description: 列定位方式；letter 为 Excel 列字母，name 为按表格中的列名称匹配。
        letter:
          type: string
          description: 列字母，例如 A、B、C；target=letter 时使用。
        name:
          type: string
          description: 列名称，需与表格第 1 行单元格文本完全一致；target=name 时使用。
        applyFromRow:
          type: integer
          minimum: 1
          default: 2
          description: 从表格第几行开始向下应用列格式，从 1 开始；按名称时第 1 行仅用于匹配列名。
        nameRow:
          type: integer
          minimum: 1
          deprecated: true
          description: 旧字段，已废弃；请改用 applyFromRow。
        headerRow:
          type: integer
          minimum: 1
          deprecated: true
          description: 旧字段，已废弃；请改用 applyFromRow。
        match:
          type: string
          deprecated: true
          description: 旧字段，仅兼容读取；请改用 name。
        type:
          type: string
          enum: [text, number, currency, percent, date, datetime, boolean]
          default: text
        format:
          type: string
          description: Excel 数据格式，例如 #,##0.00 或 yyyy-mm-dd。
        width:
          type: integer
          default: 0
        bold:
          type: boolean
          default: false
        backgroundColor:
          type: string
          enum: ['', grey, yellow, green, blue, red]
          default: ''
        horizontalAlignment:
          type: string
          enum: ['', left, center, right]
          default: ''
    ExcelRowRule:
      type: object
      description: 按表头、最后一行、指定行号或包含文本匹配行。
      properties:
        id:
          type: string
        target:
          type: string
          enum: [header, last, index, contains]
          default: header
        index:
          type: integer
          minimum: 1
          default: 1
        text:
          type: string
        bold:
          type: boolean
          default: false
        backgroundColor:
          type: string
          enum: ['', grey, yellow, green, blue, red]
          default: ''
    ExcelCellRule:
      type: object
      description: 按 A1 这类绝对单元格坐标覆盖类型与样式；优先级高于列和行规则。
      properties:
        id:
          type: string
        cell:
          type: string
          default: A1
        type:
          type: string
          enum: [text, number, currency, percent, date, datetime, boolean]
          default: text
        format:
          type: string
        bold:
          type: boolean
          default: false
        backgroundColor:
          type: string
          enum: ['', grey, yellow, green, blue, red]
          default: ''
        horizontalAlignment:
          type: string
          enum: ['', left, center, right]
          default: ''
        allowFormula:
          type: boolean
          default: false
          description: 默认禁止公式，避免模型输出造成公式注入；仅明确开启时允许写入公式。
