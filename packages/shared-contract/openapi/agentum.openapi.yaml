        - rowNumber
        - reason
    CreateDepartmentRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 160
        parentId:
          type: string
          format: uuid
          nullable: true
        sortOrder:
          type: integer
      required:
        - name
    UpdateDepartmentRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 160
        parentId:
          type: string
          format: uuid
          nullable: true
        sortOrder:
          type: integer
      required:
        - name
    UpdateDepartmentStatusRequest:
