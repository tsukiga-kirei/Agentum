openapi: 3.1.0
info:
  title: Agentum API
  version: 0.1.0
  description: Agentum 平台 API 契约占位文件。
servers:
  - url: http://localhost:8080
    description: 本地开发环境
paths:
  /api/public/tenants:
    get:
      summary: 获取公开租户列表
      description: 登录页使用的活跃租户轻量列表。公网 SaaS 场景后续应替换为租户编码或域名识别。
      tags:
        - Auth
      responses:
        "200":
          description: 活跃租户列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/TenantOption"
  /api/auth/login:
    post:
      summary: 登录并建立活跃入口上下文
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: 登录成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/LoginResponse"
        "400":
          description: 请求参数不完整或租户不可用
        "401":
          description: 用户名、密码或登录状态不正确
        "403":
          description: 用户没有所选入口权限
  /api/auth/me:
    get:
      summary: 获取当前登录用户
      tags:
        - Auth
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 当前用户上下文
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AuthUser"
        "401":
          description: 未登录或令牌无效
  /api/auth/logout:
    post:
      summary: 退出登录
      tags:
        - Auth
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 已退出
  /api/admin/tenants/{tenantId}/organization/overview:
    get:
      summary: 获取租户人员组织概览
      description: 权限管理页使用的租户人员、部门、角色和成员关系聚合视图。
      tags:
        - Organization
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 租户人员组织概览
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/TenantOrganizationOverview"
        "401":
          description: 未登录或令牌无效
        "403":
          description: 当前账号不能管理该租户
        "404":
          description: 租户不存在或已停用
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ApiError:
      type: object
      properties:
        code:
          type: string
          example: WORKFLOW_NODE_CONFIG_INVALID
        message:
          type: string
          example: 智能体节点缺少输出变量配置
        details:
          type: object
      required:
        - code
        - message
    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          nullable: true
        error:
          anyOf:
            - $ref: "#/components/schemas/ApiError"
            - type: "null"
        requestId:
          type: string
      required:
        - success
        - data
        - error
        - requestId
    TenantOption:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        code:
          type: string
      required:
        - id
        - name
        - code
    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
          format: password
        portal:
          type: string
          enum: [business, space_admin, system_admin]
        tenantId:
          type: string
          format: uuid
          nullable: true
      required:
        - username
        - password
        - portal
    LoginResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/AuthUser"
      required:
        - token
        - user
    AuthUser:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        displayName:
          type: string
        email:
          type: string
        avatar:
          type: string
        role:
          type: string
          enum: [system_admin, space_admin, designer, agent_admin, capability_admin, reviewer, executor, observer]
        tenantId:
          type: string
          format: uuid
          nullable: true
        tenantName:
          type: string
        tenantCode:
          type: string
        organization:
          type: string
        space:
          type: string
        lastLoginAt:
          type: string
      required:
        - id
        - username
        - displayName
        - email
        - avatar
        - role
        - tenantId
        - tenantName
        - tenantCode
        - organization
        - space
        - lastLoginAt
    TenantOrganizationOverview:
      type: object
      properties:
        tenantId:
          type: string
          format: uuid
        tenantName:
          type: string
        tenantCode:
          type: string
        members:
          type: array
          items:
            $ref: "#/components/schemas/OrganizationMember"
        departments:
          type: array
          items:
            $ref: "#/components/schemas/Department"
        roles:
          type: array
          items:
            $ref: "#/components/schemas/OrganizationRole"
        memberships:
          type: array
          items:
            $ref: "#/components/schemas/UserMembership"
      required:
        - tenantId
        - tenantName
        - tenantCode
        - members
        - departments
        - roles
        - memberships
    OrganizationMember:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        displayName:
          type: string
        email:
          type: string
        status:
          type: string
        lastLoginAt:
          type: string
      required:
        - id
        - username
        - displayName
        - email
        - status
        - lastLoginAt
    Department:
      type: object
      properties:
        id:
          type: string
          format: uuid
        parentId:
          type: string
          format: uuid
          nullable: true
        name:
          type: string
        code:
          type: string
        sortOrder:
          type: integer
        status:
          type: string
      required:
        - id
        - parentId
        - name
        - code
        - sortOrder
        - status
    OrganizationRole:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        scope:
          type: string
        status:
          type: string
      required:
        - id
        - code
        - name
        - scope
        - status
    UserMembership:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        userDisplayName:
          type: string
        departmentId:
          type: string
          format: uuid
          nullable: true
        departmentName:
          type: string
        roleId:
          type: string
          format: uuid
        roleName:
          type: string
        roleCode:
          type: string
        spaceCode:
          type: string
        defaultMembership:
          type: boolean
        status:
          type: string
      required:
        - id
        - userId
        - userDisplayName
        - departmentId
        - departmentName
        - roleId
        - roleName
        - roleCode
        - spaceCode
        - defaultMembership
        - status
    WorkflowDefinition:
      type: object
      description: 工作流定义草稿或发布版本的前后端共享结构。
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [draft, review, published]
        version:
          type: string
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowNode"
        variables:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowVariable"
      required:
        - id
        - name
        - status
        - nodes
        - variables
    WorkflowNode:
      type: object
      properties:
        nodeId:
          type: string
        nodeType:
          type: string
          enum: [trigger, user_input, agent, parallel_group, merge, condition, human_review, delivery]
        name:
          type: string
        inputVariables:
          type: array
          items:
            type: string
        outputVariables:
          type: array
          items:
            type: string
        config:
          type: object
        timeoutSeconds:
          type: integer
      required:
        - nodeId
        - nodeType
        - name
        - inputVariables
        - outputVariables
    WorkflowVariable:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: [string, number, boolean, object, array, file, decision]
        sourceNode:
          type: string
        description:
          type: string
        sensitive:
          type: boolean
        deliverable:
          type: boolean
      required:
        - name
        - type
        - sourceNode
        - sensitive
        - deliverable
