components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ApiError:
      type: object
      properties:
        code:
          type: string
          example: WORKFLOW_NODE_CONFIG_INVALID
        message:
          type: string
          example: 智能体节点缺少输出变量配置
        details:
          type: object
      required:
        - code
        - message
    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          nullable: true
        error:
          anyOf:
            - $ref: "#/components/schemas/ApiError"
            - type: "null"
        requestId:
          type: string
      required:
        - success
        - data
        - error
        - requestId
    TenantOption:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        code:
          type: string
      required:
        - id
        - name
        - code
    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
          format: password
        portal:
          type: string
          enum: [business, tenant_admin, system_admin]
        tenantId:
          type: string
          format: uuid
          nullable: true
      required:
        - username
        - password
        - portal
    LoginResponse:
      type: object
      properties:
        token:
          type: string
          nullable: true
        user:
          $ref: "#/components/schemas/AuthUser"
        roles:
          type: array
          items:
            $ref: "#/components/schemas/RoleInfo"
        activeRole:
          $ref: "#/components/schemas/RoleInfo"
        permissions:
          type: array
          items:
            type: string
        menus:
          type: array
          items:
            $ref: "#/components/schemas/MenuItem"
      required:
        - user
        - roles
        - activeRole
        - permissions
        - menus
    SwitchRoleRequest:
      type: object
      properties:
        roleId:
          type: string
          format: uuid
      required:
        - roleId
    SwitchRoleResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/AuthUser"
        activeRole:
          $ref: "#/components/schemas/RoleInfo"
        permissions:
          type: array
          items:
            type: string
        menus:
          type: array
          items:
            $ref: "#/components/schemas/MenuItem"
      required:
        - token
        - user
        - activeRole
        - permissions
        - menus
    RoleInfo:
      type: object
      properties:
        id:
          type: string
          format: uuid
        role:
          type: string
          enum: [business, tenant_admin, system_admin]
        tenantId:
          type: string
          format: uuid
          nullable: true
        tenantName:
          type: string
          nullable: true
        label:
          type: string
      required:
        - id
        - role
        - tenantId
        - tenantName
        - label
    MenuItem:
      type: object
      properties:
        key:
          type: string
        label:
          type: string
        icon:
          type: string
        description:
          type: string
      required:
        - key
        - label
        - icon
        - description
    AuthUser:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        displayName:
          type: string
        email:
          type: string
        avatar:
          type: string
        role:
          type: string
          enum: [business, tenant_admin, system_admin]
        tenantId:
          type: string
          format: uuid
          nullable: true
        tenantName:
          type: string
        tenantCode:
          type: string
        organization:
          type: string
        lastLoginAt:
          type: string
      required:
        - id
        - username
        - displayName
        - email
        - avatar
        - role
        - tenantId
        - tenantName
        - tenantCode
        - organization
        - lastLoginAt
    TenantOrganizationOverview:
      type: object
      properties:
        tenantId:
          type: string
          format: uuid
        tenantName:
          type: string
        tenantCode:
          type: string
        members:
          type: array
          items:
            $ref: "#/components/schemas/OrganizationMember"
        departments:
          type: array
          items:
            $ref: "#/components/schemas/Department"
        roles:
          type: array
          items:
            $ref: "#/components/schemas/OrganizationRole"
        memberships:
          type: array
          items:
            $ref: "#/components/schemas/UserMembership"
      required:
        - tenantId
        - tenantName
        - tenantCode
        - members
        - departments
        - roles
        - memberships
    CreateMemberRequest:
      type: object
      properties:
        username:
          type: string
          maxLength: 100
        password:
          type: string
          minLength: 8
          maxLength: 80
        displayName:
          type: string
          maxLength: 100
        email:
          type: string
          maxLength: 255
        departmentId:
          type: string
          format: uuid
          nullable: true
        roleId:
          type: string
          format: uuid
      required:
        - username
        - password
        - displayName
        - roleId
    CreateDepartmentRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 160
        parentId:
          type: string
          format: uuid
          nullable: true
        sortOrder:
          type: integer
      required:
        - name
    UpdateDepartmentRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 160
        parentId:
          type: string
          format: uuid
          nullable: true
        sortOrder:
          type: integer
      required:
        - name
    UpdateDepartmentStatusRequest:
      type: object
      properties:
        status:
          type: string
          enum:
            - active
            - disabled
      required:
        - status
    CreateTenantRoleRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 120
        description:
          type: string
          maxLength: 500
      required:
        - name
    UpdateTenantRoleRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 120
        description:
          type: string
          maxLength: 500
        status:
          type: string
          enum:
            - active
            - disabled
        membershipIds:
          type: array
          description: 角色编辑页提交的目标启用人员关系 ID 列表；勾选会追加该角色，取消只停用该角色关系，不影响人员已有其他角色。
          items:
            type: string
            format: uuid
      required:
        - name
        - status
    UpdateMembershipRoleRequest:
      type: object
      properties:
        roleIds:
          type: array
          items:
            type: string
            format: uuid
      required:
        - roleIds
    UpdateMembershipDepartmentRequest:
      type: object
      properties:
        departmentId:
          type: string
          format: uuid
          nullable: true
    UpdateMembershipStatusRequest:
      type: object
      properties:
        status:
          type: string
          enum:
            - active
            - disabled
      required:
        - status
    TenantOrgRolePageResponse:
      type: object
      properties:
        items:
          type: array
